project:
  name: jira-delay-risk
  random_seed: 42

data:
  raw_dataset_path: data/jira_dataset.csv
  prepared_dataset_path: artifacts/jira_issues_prepared.csv
  train_split: 0.8
  target_column: is_delayed
  id_column: issue_key
  delay_quantile: 0.75

features:
  numeric:
    - summary_length
    - summary_word_count
    - description_length
    - description_word_count
  categorical:
    - issue_type
    - priority
  boolean:
    - has_priority
    - component_present

training:
  metrics:
    primary: f1
    report:
      - accuracy
      - precision
      - recall
      - f1
      - roc_auc
  models:
    logistic_regression:
      C: 1.0
      max_iter: 1200
      class_weight: balanced
    random_forest:
      n_estimators: 120
      max_depth: 6
      min_samples_leaf: 20
      random_state: 42
      class_weight: balanced
    gradient_boosting:
      learning_rate: 0.07
      n_estimators: 80
      max_depth: 2
      random_state: 42
