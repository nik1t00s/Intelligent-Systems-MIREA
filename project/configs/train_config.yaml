project:
  name: task-overdue-risk
  random_seed: 42

data:
  rows: 5000
  raw_dataset_path: data/tasks_synthetic.csv
  train_split: 0.8
  target_column: is_overdue
  id_column: task_id

features:
  numeric:
    - assignee_experience
    - estimated_hours
    - actual_progress
    - days_since_created
    - comments_count
    - team_size
    - blockers_count
    - recent_reassignments
    - priority_score
    - workload_ratio
  categorical:
    - priority
    - status
    - task_type
    - sprint_phase
  boolean:
    - has_blockers
    - is_customer_facing
    - requires_review

training:
  metrics:
    primary: f1
    report:
      - accuracy
      - precision
      - recall
      - f1
      - roc_auc
  models:
    logistic_regression:
      C: 1.0
      max_iter: 1200
      class_weight: balanced
    random_forest:
      n_estimators: 250
      max_depth: 12
      min_samples_leaf: 3
      random_state: 42
      class_weight: balanced
    gradient_boosting:
      learning_rate: 0.07
      n_estimators: 220
      max_depth: 3
      random_state: 42
